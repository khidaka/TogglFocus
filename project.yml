name: TogglFocus
options:
  bundleIdPrefix: com.hidaka
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: ja

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  TogglFocus:
    type: application
    platform: iOS
    sources:
      - path: TogglFocus
    resources:
      - path: TogglFocus/Resources
        optional: true
    info:
      path: TogglFocus/Info.plist
      properties:
        CFBundleDisplayName: TogglFocus
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSSupportsLiveActivities: true
        UIRequiredDeviceCapabilities:
          - arm64
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: TogglFocus/TogglFocus.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hidaka.TogglFocus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidaka.TogglFocus
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: TogglFocusWidget

  TogglFocusWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: TogglFocusWidget
      - path: TogglFocus/LiveActivity
      - path: TogglFocus/Intents
      - path: TogglFocus/Models/TogglProject.swift
      - path: TogglFocus/Models/TogglTimeEntry.swift
      - path: TogglFocus/Models/WorkspaceClient.swift
      - path: TogglFocus/Models/ProjectMeta.swift
      - path: TogglFocus/Models/AppGroup.swift
      - path: TogglFocus/Models/SharedModelContainer.swift
      - path: TogglFocus/Networking
      - path: TogglFocus/Util
    info:
      path: TogglFocusWidget/Info.plist
      properties:
        CFBundleDisplayName: TogglFocusWidget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TogglFocusWidget/TogglFocusWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.hidaka.TogglFocus
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hidaka.TogglFocus.Widget
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        SKIP_INSTALL: YES
